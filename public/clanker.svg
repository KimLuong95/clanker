<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14F195" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#090e1a"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243360"/>
      <stop offset="100%" stop-color="#0e1525"/>
    </linearGradient>
  </defs>

  <circle cx="200" cy="200" r="190" fill="url(#glow)"/>

  <!-- Antenna -->
  <line x1="200" y1="62" x2="200" y2="40" stroke="#14F195" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <circle cx="200" cy="35" r="6" fill="#14F195">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Head -->
  <rect x="130" y="62" width="140" height="100" rx="16" fill="url(#headGrad)" stroke="#243360" stroke-width="2"/>

  <!-- Eyes -->
  <rect x="155" y="88" width="35" height="22" rx="4" fill="#05080f"/>
  <rect x="210" y="88" width="35" height="22" rx="4" fill="#05080f"/>
  <rect x="159" y="92" width="27" height="14" rx="2" fill="#14F195" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="214" y="92" width="27" height="14" rx="2" fill="#14F195" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Mouth / speaker grille -->
  <rect x="165" y="128" width="70" height="20" rx="4" fill="#05080f"/>
  <line x1="175" y1="132" x2="175" y2="144" stroke="#243360" stroke-width="2"/>
  <line x1="185" y1="132" x2="185" y2="144" stroke="#243360" stroke-width="2"/>
  <line x1="195" y1="132" x2="195" y2="144" stroke="#243360" stroke-width="2"/>
  <line x1="205" y1="132" x2="205" y2="144" stroke="#243360" stroke-width="2"/>
  <line x1="215" y1="132" x2="215" y2="144" stroke="#243360" stroke-width="2"/>
  <line x1="225" y1="132" x2="225" y2="144" stroke="#243360" stroke-width="2"/>

  <!-- Neck -->
  <rect x="180" y="162" width="40" height="16" rx="4" fill="#1a2540" stroke="#243360" stroke-width="1"/>

  <!-- Body -->
  <rect x="120" y="178" width="160" height="120" rx="12" fill="url(#bodyGrad)" stroke="#243360" stroke-width="2"/>

  <!-- Chest panel -->
  <rect x="155" y="195" width="90" height="60" rx="6" fill="#05080f" stroke="#1a2540" stroke-width="1"/>
  <!-- Power core -->
  <circle cx="200" cy="225" r="18" fill="#05080f" stroke="#14F195" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="225" r="10" fill="#14F195" opacity="0.6">
    <animate attributeName="r" values="10;12;10" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Chest bolts -->
  <circle cx="140" cy="198" r="4" fill="#243360"/>
  <circle cx="260" cy="198" r="4" fill="#243360"/>
  <circle cx="140" cy="278" r="4" fill="#243360"/>
  <circle cx="260" cy="278" r="4" fill="#243360"/>

  <!-- Left arm -->
  <rect x="85" y="185" width="30" height="80" rx="8" fill="#1a2540" stroke="#243360" stroke-width="1.5"/>
  <rect x="82" y="265" width="36" height="28" rx="6" fill="#0e1525" stroke="#243360" stroke-width="1.5"/>
  <circle cx="100" cy="185" r="8" fill="#243360" stroke="#14F195" stroke-width="1" opacity="0.6"/>

  <!-- Right arm -->
  <rect x="285" y="185" width="30" height="80" rx="8" fill="#1a2540" stroke="#243360" stroke-width="1.5"/>
  <rect x="282" y="265" width="36" height="28" rx="6" fill="#0e1525" stroke="#243360" stroke-width="1.5"/>
  <circle cx="300" cy="185" r="8" fill="#243360" stroke="#14F195" stroke-width="1" opacity="0.6"/>

  <!-- Legs -->
  <rect x="150" y="298" width="40" height="60" rx="6" fill="#1a2540" stroke="#243360" stroke-width="1.5"/>
  <rect x="210" y="298" width="40" height="60" rx="6" fill="#1a2540" stroke="#243360" stroke-width="1.5"/>

  <!-- Feet -->
  <rect x="140" y="352" width="60" height="20" rx="6" fill="#0e1525" stroke="#243360" stroke-width="1.5"/>
  <rect x="200" y="352" width="60" height="20" rx="6" fill="#0e1525" stroke="#243360" stroke-width="1.5"/>

  <!-- "CLNK" label on chest -->
  <text x="200" y="268" text-anchor="middle" fill="#14F195" font-family="monospace" font-size="14" font-weight="bold" opacity="0.9">CLNK</text>
</svg>
